<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI SaaS Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; }

.sidebar {
  width:220px; background:#020617; padding:20px; height:100vh;
}

.sidebar button {
  width:100%; margin:10px 0; padding:10px;
  background:#1e293b; border:none; color:white; cursor:pointer;
}

.main { flex:1; padding:20px; }

.card {
  background:#1e293b; padding:20px;
  border-radius:10px; margin-top:20px;
}

.btn {
  padding:10px; background:#38bdf8;
  border:none; cursor:pointer; margin-top:10px;
}

input, textarea {
  width:100%; padding:10px; margin-top:10px;
}

.blog-item {
  background:#334155; margin:10px 0; padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 SaaS</h2>
  <button onclick="show('auth')">Login</button>
  <button onclick="show('generator')">Generate</button>
  <button onclick="show('history')">History</button>
</div>

<div class="main">

<h2>AI Blog SaaS</h2>
<div>
  <span id="credits">Credits: -</span>
  <button class="btn" onclick="upgrade()">Upgrade</button>
</div>

<!-- AUTH -->
<div id="auth" class="page">
  <div class="card">
    <h3>Signup</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="signup()">Signup</button>

    <h3>Login</h3>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- GENERATOR -->
<div id="generator" class="page" style="display:none;">
  <div class="card">
    <button class="btn" onclick="generate()">Generate Blog</button>
    <textarea id="output"></textarea>
    <button class="btn" onclick="publish()">Publish</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="page" style="display:none;">
  <div class="card">
    <h3>Your Blogs</h3>
    <div id="blogs"></div>
  </div>
</div>

</div>

<script>

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function getToken(){
  return localStorage.getItem("token");
}

// ===== AUTH =====

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await fetch("/signup", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  alert("Signup done ✅");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Login success 🚀");
  } else {
    alert(data.message);
  }
}

// ===== GENERATE =====

async function generate(){
  const res = await fetch("/generate", {
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();

  document.getElementById("output").value = data.content;

  if(data.creditsLeft !== undefined){
    document.getElementById("credits").innerText =
      "Credits: " + data.creditsLeft;
  }
}

// ===== PUBLISH =====

async function publish(){
  const content = document.getElementById("output").value;

  await fetch("/save", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": getToken()
    },
    body: JSON.stringify({ title:"Blog", content })
  });

  alert("Saved ✅");
  loadBlogs();
}

// ===== BLOGS =====

async function loadBlogs(){
  const res = await fetch("/blogs", {
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();

  const div = document.getElementById("blogs");
  div.innerHTML = "";

  data.forEach(b=>{
    div.innerHTML += `
      <div class="blog-item">
        <p>${b.content.substring(0,100)}...</p>
        <small>Views: ${b.views}</small>
      </div>
    `;
  });
}

// ===== UPGRADE =====

async function upgrade(){
  const res = await fetch("/upgrade", {
    method:"POST",
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();
  alert(data.message);

  document.getElementById("credits").innerText = "Credits: Unlimited";
}

</script>

</body>
</html>
