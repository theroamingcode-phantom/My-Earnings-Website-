<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Blog SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #0f172a;
  color: white;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #020617;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Card */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

.btn {
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  color: black;
  font-weight: bold;
  margin-top: 10px;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 10px;
}

/* Blog list */
.blog-item {
  background: #334155;
  margin: 10px 0;
  padding: 10px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🤖 AI SaaS</h2>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('generator')">Generate</button>
  <button onclick="showPage('history')">History</button>
</div>

<!-- Main -->
<div class="main">

<h2>AI Blog Generator</h2>
<button class="btn" onclick="upgrade()">Upgrade</button>

<!-- Dashboard -->
<div id="dashboard" class="page">
  <div class="card">
    <h3>Total Blogs: <span id="count">0</span></h3>
  </div>
</div>

<!-- Generator -->
<div id="generator" class="page" style="display:none;">
  <div class="card">
    <button class="btn" onclick="generate()">Generate Blog</button>
    <textarea id="output"></textarea>
    <button class="btn" onclick="publishBlog()">Publish</button>
  </div>
</div>

<!-- History -->
<div id="history" class="page" style="display:none;">
  <div class="card">
    <h3>Published Blogs</h3>
    <div id="blogList"></div>
  </div>
</div>

</div>

<script>

// page switch
function showPage(page){
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(page).style.display="block";
}

// upgrade button
function upgrade(){
  alert("Upgrade feature coming soon 🚀");
}

// generate blog
async function generate(){
  const res = await fetch("/generate");
  const data = await res.json();

  document.getElementById("output").value = data.content;
}

// publish blog
async function publishBlog(){
  const content = document.getElementById("output").value;

  if(!content){
    alert("Generate blog first");
    return;
  }

  await fetch("/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "My Blog",
      content: content
    })
  });

  alert("Blog Published ✅");
  loadBlogs();
}

// load blogs
async function loadBlogs(){
  const res = await fetch("/blogs");
  const blogs = await res.json();

  document.getElementById("count").innerText = blogs.length;

  const list = document.getElementById("blogList");
  list.innerHTML = "";

  blogs.forEach(b=>{
    list.innerHTML += `
      <div class="blog-item">
        <p>${b.content.substring(0,100)}...</p>
        <small>Views: ${b.views}</small>
      </div>
    `;
  });
}

// initial load
loadBlogs();

</script>

</body>
</html>
