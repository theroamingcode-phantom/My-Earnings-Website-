<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Blog Generator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🤖 AI Blog Generator</h1>

<div class="container">

  <button onclick="generatePost()">Generate AI Post</button>

  <div class="box">
    <input id="title" placeholder="Title" />
    <textarea id="content" rows="5" placeholder="Content"></textarea>
  </div>

</div>

<script>
async function generatePost() {
  try {
    // 🔥 FULL URL use karo (important)
    const res = await fetch(window.location.origin + "/generate");

    const text = await res.text();
    console.log("RAW:", text);

    let data;

    try {
      data = JSON.parse(text);
    } catch (e) {
      alert("Server se HTML aa raha hai ❌ (console check karo)");
      return;
    }

    document.getElementById("title").value = data.title || "";
    document.getElementById("content").value = data.content || "";

  } catch (err) {
    console.error(err);
    alert("Fetch error ❌");
  }
}
</script>

</body>
</html>
