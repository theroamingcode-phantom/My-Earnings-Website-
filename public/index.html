<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI SaaS Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
  height:100vh;
}

.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.btn {
  padding:10px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
}

.blog {
  background:#334155;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 SaaS</h2>
  <button onclick="show('auth')">Login</button>
  <button onclick="show('generator')">Generate</button>
  <button onclick="show('history')">History</button>
</div>

<div class="main">

<h2>AI Blog Generator</h2>

<div>
  <span id="credits">Credits: -</span>
  <button class="btn" onclick="upgrade()">Upgrade</button>
</div>

<!-- AUTH -->
<div id="auth" class="page">
  <div class="card">
    <h3>Signup / Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="signup()">Signup</button>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- GENERATOR -->
<div id="generator" class="page" style="display:none;">
  <div class="card">
    <button class="btn" onclick="generate()">Generate Blog</button>
    <textarea id="output" rows="10"></textarea>
    <button class="btn" onclick="publish()">Publish</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="page" style="display:none;">
  <div class="card">
    <h3>Your Blogs</h3>
    <div id="blogs"></div>
  </div>
</div>

</div>

<script>

// ===== UI SWITCH =====
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

// ===== TOKEN =====
function getToken(){
  return localStorage.getItem("token");
}

// ===== SIGNUP =====
async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await fetch("/signup", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  alert("Signup done ✅");
}

// ===== LOGIN =====
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Login success 🚀");
    loadBlogs();
  } else {
    alert(data.message);
  }
}

// ===== GENERATE =====
async function generate(){
  const res = await fetch("/generate", {
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();

  document.getElementById("output").value = data.content;

  if(data.creditsLeft !== undefined){
    document.getElementById("credits").innerText =
      "Credits: " + data.creditsLeft;
  }
}

// ===== PUBLISH =====
async function publish(){
  const content = document.getElementById("output").value;

  await fetch("/save", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": getToken()
    },
    body: JSON.stringify({ title:"Blog", content })
  });

  alert("Saved ✅");
  loadBlogs();
}

// ===== LOAD BLOGS =====
async function loadBlogs(){
  const res = await fetch("/blogs", {
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();

  const div = document.getElementById("blogs");
  div.innerHTML = "";

  data.forEach(b=>{
    div.innerHTML += `
      <div class="blog">
        <p>${b.content.substring(0,100)}...</p>
        <small>Views: ${b.views}</small><br>
        <a href="/blog/${b._id}" target="_blank">View</a>
      </div>
    `;
  });
}

// ===== UPGRADE =====
async function upgrade(){
  const res = await fetch("/upgrade", {
    method:"POST",
    headers:{ "Authorization": getToken() }
  });

  const data = await res.json();

  alert(data.message);
  document.getElementById("credits").innerText = "Credits: Unlimited";
}

</script>

</body>
</html>
