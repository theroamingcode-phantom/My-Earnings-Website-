<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Blog Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .loading {
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>🤖 AI Blog Generator</h1>

  <div class="container">

    <button onclick="generatePost()">Generate AI Post</button>

    <div class="loading" id="loading" style="display:none;">
      Generating... ⏳
    </div>

    <div class="box">
      <input id="title" placeholder="Title..." />
      <textarea id="content" rows="6" placeholder="Content..."></textarea>
    </div>

  </div>

  <script>
    async function generatePost() {
      const loading = document.getElementById("loading");
      loading.style.display = "block";

      try {
        const res = await fetch(window.location.origin + "/generate");

        const data = await res.json();

        document.getElementById("title").value = data.title || "";
        document.getElementById("content").value = data.content || "";

      } catch (err) {
        console.error(err);
        alert("Error generating post ❌");
      }

      loading.style.display = "none";
    }
  </script>

</body>
</html>
