<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SaaS Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #020617;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #1e293b;
  color: white;
  border: none;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Cards */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* Input */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

button.generate {
  background: #38bdf8;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* Output */
#output {
  white-space: pre-line;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🚀 AI SaaS</h2>

    <button onclick="showSection('generate')">Generate</button>
    <button onclick="showSection('history')">History</button>
    <button onclick="upgrade()">Upgrade 💰</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Generate Section -->
    <div id="generateSection" class="card">
      <h2>AI Content Generator</h2>

      <input id="prompt" placeholder="Enter topic..." />

      <button class="generate" onclick="generateContent()">Generate</button>

      <div id="output"></div>
    </div>

    <!-- History -->
    <div id="historySection" class="card" style="display:none;">
      <h2>History</h2>
      <div id="history"></div>
    </div>

  </div>

</div>

<script>

function showSection(section) {
  document.getElementById("generateSection").style.display = "none";
  document.getElementById("historySection").style.display = "none";

  if (section === "generate") {
    document.getElementById("generateSection").style.display = "block";
  } else {
    document.getElementById("historySection").style.display = "block";
  }
}

// 🔥 Generate API call
async function generateContent() {
  const prompt = document.getElementById("prompt").value;

  if (!prompt) {
    alert("Enter prompt");
    return;
  }

  document.getElementById("output").innerText = "Generating...";

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById("output").innerText = data.error;
      return;
    }

    document.getElementById("output").innerText = data.content;

    // Save history
    const historyDiv = document.getElementById("history");
    historyDiv.innerHTML += `<p>📝 ${prompt}</p>`;

  } catch (err) {
    document.getElementById("output").innerText = "Server error";
  }
}

// 💰 Upgrade button
function upgrade() {
  alert("Upgrade feature coming soon 💰");
}

</script>

</body>
</html>
