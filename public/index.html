<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI SaaS Blog Generator</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #0f172a;
  color: white;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #020617;
  padding: 20px;
  height: 100vh;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1e293b;
  border: none;
  color: white;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Top */
.topbar {
  display: flex;
  justify-content: space-between;
}

/* Card */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

/* Buttons */
.btn {
  padding: 10px 15px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 200px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🤖 AI SaaS</h2>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('generator')">Generate</button>
  <button onclick="showPage('history')">History</button>
</div>

<!-- Main -->
<div class="main">

<div class="topbar">
  <h2>AI Blog Generator</h2>
  <button class="btn">Upgrade</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="page">
  <div class="card">
    <h3>Total Blogs: <span id="count">0</span></h3>
    <h3>Total Views: <span id="views">0</span></h3>
  </div>
</div>

<!-- Generator -->
<div id="generator" class="page" style="display:none;">
  <div class="card">
    <button class="btn" onclick="generate()">Generate Blog</button>
    <textarea id="output"></textarea>

    <button class="btn" onclick="saveBlog()">Publish</button>
  </div>
</div>

<!-- History -->
<div id="history" class="page" style="display:none;">
  <div class="card">
    <h3>Saved Blogs</h3>
    <div id="list"></div>
  </div>
</div>

</div>

<script>

let blogs = [];
let views = 0;

function showPage(page){
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(page).style.display="block";
}

async function generate(){
  const res = await fetch("/generate");
  const data = await res.json();
  document.getElementById("output").value = data.content;
}

function saveBlog(){
  const text = document.getElementById("output").value;

  if(!text) return alert("Generate first");

  blogs.push(text);
  views += 10;

  document.getElementById("count").innerText = blogs.length;
  document.getElementById("views").innerText = views;

  renderBlogs();
}

function renderBlogs(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  blogs.forEach((b,i)=>{
    list.innerHTML += `
      <div style="background:#334155;margin:10px;padding:10px">
        <p>${b.substring(0,100)}...</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
