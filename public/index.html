<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Blog</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>💰 My AI Blog</h1>

  <div class="container">

    <button onclick="generatePost()">🤖 Generate AI Post</button>

    <div class="box">
      <h3>Add Post</h3>

      <input id="title" placeholder="Title..." />
      <textarea id="content" rows="5" placeholder="Content..."></textarea>

      <button onclick="publishPost()">Publish</button>
    </div>

    <div class="box">
      <h3>📄 Posts</h3>
      <div id="posts"></div>
    </div>

  </div>

  <script>
    async function generatePost() {
      try {
        const res = await fetch("/generate");

        // 👇 RAW response debug
        const text = await res.text();
        console.log("RAW RESPONSE:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          alert("Server JSON nahi bhej raha ❌ (console check karo)");
          return;
        }

        document.getElementById("title").value = data.title || "";
        document.getElementById("content").value = data.content || "";

      } catch (err) {
        console.error(err);
        alert("Error fetching AI post ❌");
      }
    }

    function publishPost() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;

      if (!title || !content) {
        alert("Title aur content required hai");
        return;
      }

      const postDiv = document.createElement("div");
      postDiv.style.marginTop = "10px";
      postDiv.style.padding = "10px";
      postDiv.style.background = "#334155";
      postDiv.style.borderRadius = "6px";

      postDiv.innerHTML = `<h4>${title}</h4><p>${content}</p>`;

      document.getElementById("posts").prepend(postDiv);

      // clear fields
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
    }
  </script>

</body>
</html>
