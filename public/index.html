<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Blog Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(99,102,241,0.6);
    }

    .output {
      background: #0f172a;
      border-radius: 10px;
      padding: 20px;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .loading {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>🤖 AI Blog Generator</h1>

  <button onclick="generateBlog()">Generate Blog</button>

  <div class="loading" id="loading">⏳ Generating AI content...</div>

  <div class="output">
    <div class="title" id="title">Your blog will appear here...</div>
    <div id="content"></div>
  </div>
</div>

<script>
  async function generateBlog() {
    document.getElementById("loading").style.display = "block";

    try {
      const res = await fetch("/generate");
      const data = await res.json();

      document.getElementById("title").innerText = data.title;
      document.getElementById("content").innerText = data.content;

    } catch (err) {
      document.getElementById("title").innerText = "Error ❌";
      document.getElementById("content").innerText = "Failed to fetch AI blog.";
    }

    document.getElementById("loading").style.display = "none";
  }
</script>

</body>
</html>
