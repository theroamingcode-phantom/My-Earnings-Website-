<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Blog Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    textarea {
      width: 90%;
      height: 150px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🚀 AI Blog Generator</h1>

  <button onclick="generatePost()">Generate AI Post</button>

  <div class="box">
    <input id="title" placeholder="Blog Title..." />
    <textarea id="content" placeholder="Blog Content..."></textarea>
  </div>

  <script>
    async function generatePost() {
      try {
        const res = await fetch("/generate"); // ✅ correct route
        const data = await res.json();

        console.log("API Response:", data);

        document.getElementById("title").value = data.title || "No title";
        document.getElementById("content").value = data.content || "No content";

      } catch (err) {
        alert("Error: " + err.message);
        console.error(err);
      }
    }
  </script>

</body>
</html>
