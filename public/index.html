<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My AI Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0b132b; color:white; font-family:sans-serif;">

  <h1>💰 My AI Blog</h1>

  <button onclick="generatePost()">🤖 Generate AI Post</button>

  <h2>Add Post</h2>
  <input id="title" placeholder="Title"><br><br>
  <textarea id="content" placeholder="Content"></textarea><br><br>
  <button onclick="addPost()">Publish</button>

  <h2>Posts</h2>
  <div id="posts"></div>

  <h2>Analytics</h2>
  <p>Views: <span id="views">0</span></p>
  <p>Clicks: <span id="clicks">0</span></p>

  <!-- ✅ IMPORTANT: Script yaha hona chahiye -->
  <script>
    async function loadPosts() {
      const res = await fetch('/api/posts');
      const data = await res.json();

      const container = document.getElementById('posts');
      container.innerHTML = '';

      data.reverse().forEach(p => {
        container.innerHTML += `
          <div style="border:1px solid white; margin:10px; padding:10px;">
            <h3>${p.title}</h3>
            <p>${p.content}</p>
          </div>
        `;
      });
    }

    async function addPost() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;

      await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });

      loadPosts();
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();

      document.getElementById('views').innerText = data.views;
      document.getElementById('clicks').innerText = data.clicks;
    }

    async function generatePost() {
      alert("Button working"); // test ke liye

      const res = await fetch('/api/generate');
      const data = await res.json();

      document.getElementById('title').value = data.title;
      document.getElementById('content').value = data.content;
    }

    loadPosts();
    loadStats();
  </script>

</body>
</html>
